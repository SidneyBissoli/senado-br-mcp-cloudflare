name: Verify consultas_votos acervo

# WEEKLY integrity check of the frozen consultas_votos acervo (Arquimedes CSV, votos históricos por
# UF). Split out of the daily corpus ingest (ingest-ecidadania.yml) per ROADMAP Etapa 2: the ordinary
# corpora went daily to sharpen the first-seen series (decisão D3), but consultas_votos is a single-
# vintage archive (decisão D1) that can never contribute to first-seen — re-ingesting its ~33 MB CSV
# daily would be pure waste. Instead this run VERIFIES the acervo weekly.
#
# The job downloads + re-hashes the CSV and compares against the vintage registered in D1. If it
# hashes identically, it records an 'ok' run row and reapplies NOTHING (no ~15k upserts). If it
# diverges, the "acervo congelado" premise is falsified: it records an 'anomalo' run row and the
# job FAILS so the Action failure notification alerts for human review — never a silent overwrite.
# Re-ingesting a legitimately new vintage is an explicit manual `force` dispatch (INGEST_FORCE=1).
#
# RUNS ON THE SELF-HOSTED RUNNER (label `ecidadania`), like the e-Cidadania entity ingests: as of
# 2026-07-20 the Senado block on GitHub's cloud (Azure) egress IPs extends to www.senado.gov.br
# (the Arquimedes CSV host) — curl: (28) connect timeout from ubuntu-latest, instant 200 from the
# Hetzner box. Same security rule as the entity stubs: triggers are schedule/workflow_dispatch
# ONLY — never add a pull_request/pull_request_target trigger (repo is public).

on:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Re-ingest a new vintage (override the integrity check and overwrite the acervo)"
        type: boolean
        default: false

concurrency:
  group: verify-consultas-votos
  cancel-in-progress: false

jobs:
  verify:
    runs-on: [self-hosted, ecidadania]
    # Hang-guard: self-hosted runners have no 6h cap. Download+hash+run-row finishes in minutes.
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # In verify mode the generate step exits non-zero on divergence (the alert). The apply step below
      # runs with if: always() so the 'anomalo'/'ok' run row is still recorded in ecidadania_scrape_runs.
      # A `force` dispatch flips off verify and re-ingests the CSV as a new vintage (human-approved).
      - name: Verify consultas_votos acervo (generate run/load SQL)
        id: verify
        env:
          INGEST_CONSULTAS_VOTOS_VERIFY: ${{ inputs.force && '0' || '1' }}
          INGEST_FORCE: ${{ inputs.force && '1' || '0' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # A D1-scoped API token can't read /memberships for account auto-discovery, so wrangler
          # needs the account id explicitly (otherwise: "request to /memberships failed", code 9106).
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run ingest:ecidadania:consultas-votos

      - name: Apply to D1 (records the run row even on a divergence alert)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in $(ls scripts/ingest-ecidadania/out-consultas-votos-*.sql | sort); do
            echo "Applying $f"
            npx wrangler d1 execute senado-ecidadania --remote --file="$f"
          done
