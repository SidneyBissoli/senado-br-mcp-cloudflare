name: Ingest consultas_votos (semanal)

# WEEKLY re-ingest of the consultas_votos acervo (Arquimedes CSV, votos históricos por UF).
#
# HISTORY: this workflow started as a weekly INTEGRITY CHECK of a supposedly frozen single-vintage
# acervo (ROADMAP Etapa 2, decisão D1) — any divergence failed the job for human review, and
# re-ingesting required a manual `force` dispatch. On 2026-07-20 that premise was falsified: the
# Senado republished the CSV as a fresh vintage (2026-07-19: +43 matérias, 648 updated — legitimate
# growth, votes accumulating). Updates are routine, so the scheduled run now re-ingests normally.
# (The filename keeps the historical `verify-` prefix so the workflow's run history stays attached.)
#
# The automatic guards that remain (same model as the daily entity ingests):
#   - CSV sanity: header present + >0 data rows, else 'erro' run row + exit 1;
#   - catastrophic floor (classifyRun): fewer matérias than ECIDADANIA_CORPUS_MIN_PCT% (80%) of the
#     last good run → 'anomalo' run row + exit 1, corpus NEVER overwritten. The Action failure IS
#     the alert; a legitimate large shrink is re-ingested via an explicit `force` dispatch.
# Row hashes exclude the CSV vintage stamp (consultaVotoCore), so a re-ingest with unchanged votes
# writes zero `_history` rows. Verify mode still exists in the script (--verify /
# INGEST_CONSULTAS_VOTOS_VERIFY=1) as an on-demand integrity check — no longer scheduled.
#
# RUNS ON THE SELF-HOSTED RUNNER (label `ecidadania`), like the e-Cidadania entity ingests: as of
# 2026-07-20 the Senado block on GitHub's cloud (Azure) egress IPs extends to www.senado.gov.br
# (the Arquimedes CSV host) — curl: (28) connect timeout from ubuntu-latest, instant 200 from the
# Hetzner box. Same security rule as the entity stubs: triggers are schedule/workflow_dispatch
# ONLY — never add a pull_request/pull_request_target trigger (repo is public).

on:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Override the catastrophic floor (write even a large legitimate shrink)"
        type: boolean
        default: false

concurrency:
  group: verify-consultas-votos
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: [self-hosted, ecidadania]
    # Hang-guard: self-hosted runners have no 6h cap. Download+parse+load finishes in minutes.
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # On a guard failure the generate step writes the 'erro'/'anomalo' run row AND exits 1; the
      # apply step below runs with if: always() so that run row is still recorded in
      # ecidadania_scrape_runs — never a silent gap, never an overwritten corpus.
      - name: Generate consultas_votos corpus load SQL
        id: generate
        env:
          INGEST_FORCE: ${{ inputs.force && '1' || '0' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # A D1-scoped API token can't read /memberships for account auto-discovery, so wrangler
          # needs the account id explicitly (otherwise: "request to /memberships failed", code 9106).
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run ingest:ecidadania:consultas-votos

      - name: Apply to D1 (records the run row even on a guard failure)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in $(ls scripts/ingest-ecidadania/out-consultas-votos-*.sql | sort); do
            echo "Applying $f"
            npx wrangler d1 execute senado-ecidadania --remote --file="$f"
          done
