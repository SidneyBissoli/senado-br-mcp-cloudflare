name: Ingest e-Cidadania — ideias

# Scheduler stub: crawls the full ideias listing (pesquisaideia?situacao=N&p=M).
# All logic lives in the reusable ingest-ecidadania-entity.yml.
on:
  schedule:
    - cron: "0 11 * * *" # daily 11:00 UTC (08:00 America/Sao_Paulo)
  workflow_dispatch:
    inputs:
      force:
        description: "Override the catastrophic floor (write even a large legitimate shrink)"
        type: boolean
        default: false

jobs:
  call:
    uses: ./.github/workflows/ingest-ecidadania-entity.yml
    with:
      entity: ideias
      force: ${{ inputs.force || false }}
    secrets: inherit
