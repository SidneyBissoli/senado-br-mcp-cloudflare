name: Release dataset (freeze + DOI)

# Máquina de RELEASES do dataset de participação do e-Cidadania (Fase 1.3, sessão C2).
# Dispara ao empurrar uma tag `dataset-v<X.Y.Z>` (o prefixo separa das tags de código v3.x) OU por
# workflow_dispatch. Fluxo: build do dataset (consome o pipeline da Fase 1.2, lê o D1) → freeze
# (SHA256SUMS + release.json + arquivos de citação) → verificação de integridade → tarball →
# GitHub Release com assets → (opcional, gated por ZENODO_TOKEN) depósito no Zenodo com version-DOI.
#
# O passo Zenodo é OPT-IN: sem o segredo ZENODO_TOKEN ele é no-op e o release do GitHub sai igual.
# Por segurança, NÃO publica no Zenodo automaticamente — deixa em rascunho, a menos que o dispatch
# peça zenodo_publish=true. Ver docs/release-runbook.md para os passos humanos (conta, token, DOIs).

on:
  push:
    tags:
      - "dataset-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versão SemVer do release (X.Y.Z) — usada quando não há tag"
        type: string
        required: true
      zenodo_publish:
        description: "Publicar no Zenodo (senão, deixa em rascunho para revisão)"
        type: boolean
        default: false

concurrency:
  group: release-dataset
  cancel-in-progress: false

permissions:
  contents: write # criar o GitHub Release e anexar assets

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Exposto no job para que o `if:` do passo Zenodo possa checar presença (secrets não são
      # legíveis diretamente em `if:`). Vazio ⇒ passo Zenodo é pulado (no-op).
      ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
    steps:
      - name: Checkout (histórico completo para o commit do freeze)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deriva a versão do release (tag ou input)
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#dataset-v}"
          else
            V="${{ inputs.version }}"
          fi
          echo "Versão do release: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # Guard de formato SemVer estrito.
          echo "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "::error::versão inválida: $V"; exit 1; }

      - name: Build do dataset (Fase 1.2 — lê o corpus soberano no D1)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run build:dataset

      - name: Resolve o diretório de build
        id: dir
        run: |
          DIR="$(dirname "$(ls dataset/*/datapackage.json | head -1)")"
          test -n "$DIR" || { echo "::error::build do dataset não produziu datapackage.json"; exit 1; }
          echo "Diretório de build: $DIR"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Freeze (SHA256SUMS + release.json + arquivos de citação)
        run: |
          npm run release:dataset -- \
            --version "${{ steps.ver.outputs.version }}" \
            --in "${{ steps.dir.outputs.dir }}"

      - name: Verifica integridade (sha256sum -c)
        working-directory: ${{ steps.dir.outputs.dir }}
        run: sha256sum -c SHA256SUMS

      - name: Empacota o tarball do release
        id: pack
        run: |
          V="${{ steps.ver.outputs.version }}"
          DIR="${{ steps.dir.outputs.dir }}"
          TAR="ecidadania-participacao-${V}.tar.gz"
          # Determinístico: nomes ordenados, mtime/owner fixos.
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
              -czf "$TAR" -C "$(dirname "$DIR")" "$(basename "$DIR")"
          echo "tar=$TAR" >> "$GITHUB_OUTPUT"
          ls -la "$TAR"

      - name: GitHub Release (tarball + checksums + manifesto)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('dataset-v{0}', steps.ver.outputs.version) }}
          name: "Dataset e-Cidadania — dataset-v${{ steps.ver.outputs.version }}"
          body_path: CHANGELOG-dataset.md
          files: |
            ${{ steps.pack.outputs.tar }}
            ${{ steps.dir.outputs.dir }}/SHA256SUMS
            ${{ steps.dir.outputs.dir }}/release.json

      - name: Zenodo (opt-in — gated por ZENODO_TOKEN; concept-DOI + version-DOI)
        if: ${{ env.ZENODO_TOKEN != '' }}
        env:
          # recid da deposição-pai para continuidade de concept-DOI (vazio no 1º release)
          ZENODO_DEPOSITION: ${{ vars.ZENODO_DEPOSITION }}
        run: |
          ARGS=(--version "${{ steps.ver.outputs.version }}" \
                --file "${{ steps.pack.outputs.tar }}" \
                --file "${{ steps.dir.outputs.dir }}/SHA256SUMS" \
                --file "${{ steps.dir.outputs.dir }}/release.json")
          [ -n "$ZENODO_DEPOSITION" ] && ARGS+=(--deposition "$ZENODO_DEPOSITION")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.zenodo_publish }}" = "true" ]; then
            ARGS+=(--publish)
          fi
          npm run release:zenodo -- "${ARGS[@]}"
