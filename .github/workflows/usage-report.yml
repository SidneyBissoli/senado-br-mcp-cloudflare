name: Monthly usage report (Vetor B)

# Generates the monthly usage spreadsheet (private, internal) and uploads it as a
# build artifact. Runs at 00:00 UTC on the 1st of each month, reporting the month
# that just ended (filename = that month's last day). Also dispatchable manually.
#
# The report is intentionally NOT committed and NOT posted to an issue (it is
# internal, and open issues are penalized on some aggregators). Download it from
# the run's "Artifacts" section — artifacts are private to repo collaborators.
#
# Requires a repo secret CF_API_TOKEN with `Account Analytics: Read`.

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of each month, 00:00 UTC — reports the previous month
  workflow_dispatch:
    inputs:
      month:
        description: "Mês a reportar (YYYY-MM). Vazio = mês anterior."
        required: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps (exceljs)
        run: npm ci

      - name: Generate spreadsheet
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::Missing repo secret CF_API_TOKEN (needs 'Account Analytics: Read')."
            exit 1
          fi
          ARGS=""
          if [ -n "${{ inputs.month }}" ]; then ARGS="--month ${{ inputs.month }}"; fi
          node scripts/observability/monthly-spreadsheet.mjs $ARGS

      - name: Upload spreadsheet artifact
        uses: actions/upload-artifact@v7
        with:
          name: usage-report
          path: reports/usage/*.xlsx
          if-no-files-found: error
          retention-days: 90
