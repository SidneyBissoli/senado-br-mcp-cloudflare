name: Ingest e-Cidadania corpus

# DAILY off-Worker ingestion of the live e-Cidadania corpora into D1 (consultas, eventos, ideias).
# The job crawls the paginated HTML listing for ids + vote counts, derives status from the
# /processo API (tramitando=S), and writes a batched out.sql; the apply step bulk-loads it into D1.
# The 2h Worker Cron keeps the open/highlight items fresh; this owns the long tail.
#
# Cadence is DAILY (ROADMAP Etapa 2, decisão D3) because the first-seen series MIN(scraped_at) is the
# only measurable entry-rhythm signal and every skipped day permanently shortens it. The frozen
# consultas_votos acervo is NOT here — it can never contribute to first-seen and is a single-vintage
# archive (decisão D1); it has its own weekly INTEGRITY-CHECK workflow (verify-consultas-votos.yml).
#
# Guards (in the job): an incomplete crawl or a corpus that collapsed below the catastrophic floor
# writes only a scrape-runs row, never a shrunken corpus. The apply step runs with if: always() so
# that 'erro'/'anomalo' run row is still recorded even when the ingest step is marked failed.

# RUNS ON A SELF-HOSTED RUNNER. e-Cidadania (www12.senado.leg.br) silently drops connections from
# GitHub's cloud (Azure) egress IPs — every hosted crawl fails with `curl: (28) Connection timed out`.
# The block is Azure-range-specific, NOT datacenter-wide nor geographic (verified 05/07 via check-host.net:
# 38/40 worldwide datacenter nodes incl. Germany/Nuremberg reached the portal HTTP 200). So this crawl
# runs from a DEDICATED Hetzner (Germany) box registered as a self-hosted runner with the `ecidadania`
# label.
#
# ── Runner registration (one-time, on the dedicated box) ─────────────────────────────────────────
#   Settings ▸ Actions ▸ Runners ▸ New self-hosted runner (Linux/X64). Run ./config.sh as a NON-root
#   user and add the label `ecidadania`; install as a service (./svc.sh install <user> && ./svc.sh start).
# ── Security (repo is PUBLIC) ────────────────────────────────────────────────────────────────────
#   Safe only because this triggers on schedule/workflow_dispatch alone — NEVER add a pull_request or
#   pull_request_target trigger, which would let a forked PR run code on the box.
on:
  schedule:
    - cron: "0 5 * * *" # daily 05:00 UTC (02:00 America/Sao_Paulo)
  workflow_dispatch:
    inputs:
      force:
        description: "Override the catastrophic floor (write even a large legitimate shrink)"
        type: boolean
        default: false

concurrency:
  group: ingest-ecidadania
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: [self-hosted, ecidadania]
    # Bound the whole job so a portal hang frees the runner instead of blocking it for hours
    # (a hosted run once sat ~4h stuck on the detail backfill before we cancelled it).
    timeout-minutes: 180
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        # Default clean:true (git clean -ffdx) wipes stale out*.sql from a prior run on the
        # persistent self-hosted workspace, so the apply steps never re-load last run's SQL.

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Ensure the D1 schema exists before any load. All migrations are CREATE ... IF NOT EXISTS,
      # so re-applying them every run is idempotent and self-heals schema drift (e.g. the v2
      # ecidadania_comentarios + ecidadania_detalhe_cursor tables the enrichment jobs read/write).
      - name: Apply D1 migrations (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in $(ls migrations/*.sql | sort); do
            echo "Applying migration $f"
            npx wrangler d1 execute senado-ecidadania --remote --file="$f"
          done

      - name: Generate corpus load SQL
        id: ingest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # A D1-scoped API token can't read /memberships for account auto-discovery, so wrangler
          # needs the account id explicitly (otherwise: "request to /memberships failed", code 9106).
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          INGEST_FORCE: ${{ inputs.force && '1' || '0' }}
        run: npm run ingest:ecidadania

      - name: Apply to D1 (records the run row even on a failed/anomalous ingest)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute senado-ecidadania --remote --file=scripts/ingest-ecidadania/out.sql

      # ── Eventos corpus (HTML listing principalaudiencia?p=N; status from the listing) ──
      - name: Generate eventos corpus load SQL
        if: always()
        env:
          INGEST_FORCE: ${{ inputs.force && '1' || '0' }}
          # Faster-but-still-polite detail cadence so ~10.8k detail+AJAX fetches finish inside the job budget.
          INGEST_EVENTOS_DETAIL_DELAY_MS: "150"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run ingest:ecidadania:eventos

      - name: Apply eventos to D1
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute senado-ecidadania --remote --file=scripts/ingest-ecidadania/out-eventos.sql

      # ── Eventos nível-comentário (fragmento AJAX; tabela ecidadania_comentarios) ──
      # Emitido junto com o corpus de eventos (out-eventos-comentarios-NNN.sql); pode não existir
      # quando não há comentário novo/alterado no ciclo — aplicar em ordem, tolerando ausência.
      - name: Apply eventos comentários to D1 (batched files, in order)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in $(ls scripts/ingest-ecidadania/out-eventos-comentarios-*.sql 2>/dev/null | sort); do
            echo "Applying $f"
            npx wrangler d1 execute senado-ecidadania --remote --file="$f"
          done

      # ── Ideias corpus (HTML listing pesquisaideia?situacao=N&p=M; status per situacao bucket) ──
      # Emitted as multiple out-ideias-NNN.sql batches (~150k items); apply them in lexical order.
      - name: Generate ideias corpus load SQL
        if: always()
        env:
          INGEST_FORCE: ${{ inputs.force && '1' || '0' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run ingest:ecidadania:ideias

      - name: Apply ideias to D1 (batched files, in order)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in $(ls scripts/ingest-ecidadania/out-ideias-[0-9]*.sql 2>/dev/null | sort); do
            echo "Applying $f"
            npx wrangler d1 execute senado-ecidadania --remote --file="$f"
          done

      # ── Ideias DETALHE backfill (resumível por cursor; reabre dataPublicacao/autorUf/descricao/plConvertido) ──
      # ~113,7k ideias não cabem num run; processa um chunk por execução e persiste o cursor. Roda DEPOIS
      # do crawl de listagem (que preserva o detalhe já gravado). Emite out-ideias-detalhe-NNN.sql.
      - name: Generate ideias detail backfill SQL
        if: always()
        env:
          # Bounded chunk so this last step reliably COMPLETES (it emits SQL + advances the cursor only
          # at the end — a chunk too large to finish on a flaky portal persists nothing). ~113.7k are
          # covered over many daily runs via the cursor; a smaller chunk just means more, safer passes.
          INGEST_IDEIAS_DETALHE_CHUNK: "2000"
          INGEST_IDEIAS_DETAIL_DELAY_MS: "150"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run ingest:ecidadania:ideias-detalhe

      - name: Apply ideias detail backfill to D1 (batched files, in order)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in $(ls scripts/ingest-ecidadania/out-ideias-detalhe-*.sql 2>/dev/null | sort); do
            echo "Applying $f"
            npx wrangler d1 execute senado-ecidadania --remote --file="$f"
          done
