name: CI

# Typecheck + test on every push and pull request to master.
# Guards the two things prepublishOnly runs locally (build/test) plus the
# full typecheck (src + ingest scripts), so a red PR is caught before merge.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-flight run when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 20 is the project floor (engines.node >=20; vitest 4 also requires it).
        node-version: ["20", "22"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (src + ingest scripts)
        run: npm run typecheck

      - name: Test
        run: npm test
