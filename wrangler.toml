name = "senado-br-mcp"
main = "src/index.ts"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat"]

# Keep the *.workers.dev URL alive alongside the custom domain (it's the URL
# currently registered with the MCP registries / Smithery / clients).
workers_dev = true

# Custom domain — Cloudflare provisions the DNS record and TLS cert on deploy.
# MCP endpoint: https://senado.sidneybissoli.com/mcp
[[routes]]
pattern = "senado.sidneybissoli.com"
custom_domain = true

[vars]
SENADO_BASE_URL = "https://legis.senado.leg.br/dadosabertos"
SENADO_ADM_BASE_URL = "https://adm.senado.gov.br/adm-dadosabertos"
ALLOWED_ORIGIN = "*"
# e-Cidadania: staleness window (minutes) before D1-backed reads flag possible desatualização.
# All entities are weekly full corpora, so this only trips after a missed weekly run + buffer (~10d).
ECIDADANIA_CORPUS_STALE_MAX_MIN = "14400"
# Catastrophic floor for the off-Worker corpus jobs: a COMPLETE crawl returning < this %
# of the last good corpus is rejected (degraded-page guard). Higher than the 2h guard on purpose.
ECIDADANIA_CORPUS_MIN_PCT = "80"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "11b79fb8338e4687a332b96124390882"

# Tool-call telemetry — per-tool selection counts, queried via the AE SQL API.
# The dataset is created on first writeDataPoint; Analytics Engine must be enabled
# for the account. See instrument.ts for the (privacy-scoped) schema.
[[analytics_engine_datasets]]
binding = "SENADO_ANALYTICS"
dataset = "senado_mcp_tool_calls"

# Deploy metadata (id/tag/timestamp) — surfaced at GET /status so liveness and the
# current build are publicly verifiable (Vetor C). Built-in binding, no resource to create.
[version_metadata]
binding = "CF_VERSION_METADATA"

# e-Cidadania sovereign dataset (P2): scraped lists persisted here; tools read from D1
# instead of scraping per call. Schema in migrations/0001_ecidadania_init.sql.
[[d1_databases]]
binding = "ECIDADANIA_DB"
database_name = "senado-ecidadania"
database_id = "6d23ebdb-92b1-4112-9a8b-0d1597c589d9"

# Cron: refresh the e-Cidadania lists (cheap REST JSON only — no HTML scraping in the
# scheduled path). Every 2h cuts staleness from ~12h to ~2h at negligible portal load;
# history is append-on-change so storage stays near-zero. Adjust cadence here (deploy-time).
[triggers]
crons = ["0 */2 * * *"]
